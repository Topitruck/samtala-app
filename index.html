<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samtala - Bokningsapp</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS för styling (Inkluderar konfiguration för mörkt läge) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    
    <!-- Babel för att översätta React-koden -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- EmailJS för e-postutskick -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init({
            publicKey: "1xC_x5pFEiGnNFx5R",
          });
       })();
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; /* bg-slate-50 */
        }
        .dark body {
            background-color: #0f172a; /* bg-slate-900 för mörkt läge */
        }
        
        /* Mjuka animationer */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .slide-in-right { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(40px) scale(0.95); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }

        /* Modern scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* Optimerad Utskrift */
        @media print {
            body { 
                background-color: white !important; 
                color: black !important; 
            }
            .print\:hidden { display: none !important; }
            .shadow-xl, .shadow-sm, .shadow-md, .shadow-lg { box-shadow: none !important; border: none !important; }
            .bg-slate-50, .bg-white, .dark\:bg-slate-800 { background-color: transparent !important; }
            
            table { width: 100% !important; border-collapse: collapse !important; margin-top: 15px; }
            th { border-bottom: 2px solid #000 !important; color: black !important; font-weight: bold !important; padding: 12px 8px !important; text-align: left;}
            td { border-bottom: 1px solid #ccc !important; padding: 12px 8px !important; color: black !important; }
            tr { page-break-inside: avoid !important; }
            
            nav, .search-container, button { display: none !important; }
        }
    </style>
</head>
<body class="text-slate-800 dark:text-slate-100 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // Ladda in React och Firebase direkt från nätet
        import React, { useState, useEffect } from 'https://esm.sh/react@18.3.1';
        import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, linkWithPopup } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, updateDoc, deleteDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
        import { Calendar, Clock, Share2, User, Check, Users, ArrowRight, Copy, AlertCircle, Link as LinkIcon, Home, Download, Printer, FileText, CheckCircle, Mail, Send, XCircle, Trash2, Video, MapPin, LogOut, ChevronLeft, Plus, BarChart3, ChevronRight, Moon, Sun, Search, Edit2, Save, MessageSquare } from 'https://esm.sh/lucide-react@0.378.0?deps=react@18.3.1,react-dom@18.3.1';

        // ==========================================
        // 🛑 DINA FIREBASE-NYCKLAR
        // ==========================================
        const userFirebaseConfig = {
          apiKey: "AIzaSyATLBTPZ1y-tnnxjWRR_Vby_RwNjHH_Zss",
          authDomain: "samtala-39dfe.firebaseapp.com",
          projectId: "samtala-39dfe",
          storageBucket: "samtala-39dfe.firebasestorage.app",
          messagingSenderId: "1080986537108",
          appId: "1:1080986537108:web:f646fe56672becf021b881"
        };
        // ==========================================

        let activeConfig = userFirebaseConfig;
        if (typeof __firebase_config !== 'undefined') {
          try { activeConfig = JSON.parse(__firebase_config); } catch (e) { console.error(e); }
        }

        const app = initializeApp(activeConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'samtala-app';

        // --- HJÄLPFUNKTION: KALENDERFIL ---
        const generateICS = (eventTitle, timeString, format, host) => {
          try {
            const parts = timeString.split(' kl ');
            if (parts.length !== 2) return;
            const dateStr = parts[0].replace(/-/g, '');
            const timeParts = parts[1].split(' - '); 
            const startT = timeParts[0].replace(':', '') + '00';
            const endT = timeParts[1].replace(':', '') + '00';

            const icsContent = `BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Samtala App//SV\nBEGIN:VEVENT\nSUMMARY:${eventTitle} med ${host}\nDTSTART;TZID=Europe/Stockholm:${dateStr}T${startT}\nDTEND;TZID=Europe/Stockholm:${dateStr}T${endT}\nLOCATION:${format}\nDESCRIPTION:Bokat samtal/möte via Samtala.\nEND:VEVENT\nEND:VCALENDAR`;
            
            const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', 'Samtala_Bokning.ics');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          } catch (error) { console.error("Kunde inte generera kalenderfil", error); }
        };

        // --- HJÄLPFUNKTION: KONTROLLERA OM TID PASSERAT ---
        const isTimePast = (timeString) => {
          if(!timeString) return false;
          try {
            const parts = timeString.split(' kl ');
            if(parts.length !== 2) return false;
            const datePart = parts[0];
            const startTimePart = parts[1].split(' - ')[0]; 
            const slotDate = new Date(`${datePart}T${startTimePart}:00`);
            
            if(isNaN(slotDate.getTime())) return false;
            return slotDate < new Date(); 
          } catch (e) { return false; }
        };

        function App() {
          const [user, setUser] = useState(null);
          const [events, setEvents] = useState([]);
          const [slots, setSlots] = useState([]);
          const [sharedSelections, setSharedSelections] = useState([]);
          const [teacherProfile, setTeacherProfile] = useState(null);
          const [isLoadingProfile, setIsLoadingProfile] = useState(true);
          const [currentHash, setCurrentHash] = useState(window.location.hash || '#/');
          
          // --- LOCAL STORAGE & DARK MODE ---
          const [isDarkMode, setIsDarkMode] = useState(() => {
            try {
              const savedMode = window.localStorage.getItem('samtala_theme');
              if (savedMode !== null) return savedMode === 'dark';
              return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            } catch (error) {
              return false;
            }
          });
          const [toast, setToast] = useState(null);

          // Hantera Mörkt Läge & spara till LocalStorage
          useEffect(() => {
            try {
              if (isDarkMode) {
                document.documentElement.classList.add('dark');
                window.localStorage.setItem('samtala_theme', 'dark');
              } else {
                document.documentElement.classList.remove('dark');
                window.localStorage.setItem('samtala_theme', 'light');
              }
            } catch (error) {
              console.error("Local storage error:", error);
            }
          }, [isDarkMode]);

          useEffect(() => {
            const handleHashChange = () => setCurrentHash(window.location.hash || '#/');
            window.addEventListener('hashchange', handleHashChange);
            return () => window.removeEventListener('hashchange', handleHashChange);
          }, []);

          let currentView = 'host';
          let routeParams = {};

          if (currentHash.startsWith('#/b/')) { currentView = 'event_public'; routeParams.eventId = currentHash.replace('#/b/', ''); }
          else if (currentHash.startsWith('#/share/')) { currentView = 'shared_selection'; routeParams.sharedId = currentHash.replace('#/share/', ''); }
          else if (currentHash.startsWith('#/event/')) { currentView = 'host_event'; routeParams.eventId = currentHash.replace('#/event/', ''); }
          else if (currentHash.startsWith('#/manage/')) { currentView = 'manage_booking'; routeParams.slotId = currentHash.replace('#/manage/', ''); }
          else { currentView = 'host_dashboard'; }

          useEffect(() => {
            const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
              if (currentUser) setUser(currentUser);
              else {
                try {
                  if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                  else await signInAnonymously(auth);
                } catch (error) { console.error("Auth error:", error); }
              }
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;
            const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'samtala_profiles', user.uid);
            const unsubProfile = onSnapshot(profileRef, (docSnap) => {
              if (docSnap.exists()) setTeacherProfile(docSnap.data());
              else setTeacherProfile(null);
              setIsLoadingProfile(false);
            }, console.error);

            const eventsRef = collection(db, 'artifacts', appId, 'public', 'data', 'samtala_events');
            const unsubEvents = onSnapshot(eventsRef, snapshot => setEvents(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))), console.error);

            const slotsRef = collection(db, 'artifacts', appId, 'public', 'data', 'samtala_slots');
            const unsubSlots = onSnapshot(slotsRef, snapshot => setSlots(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))), console.error);

            const sharedRef = collection(db, 'artifacts', appId, 'public', 'data', 'samtala_shared');
            const unsubShared = onSnapshot(sharedRef, snapshot => setSharedSelections(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))), console.error);

            return () => { unsubProfile(); unsubEvents(); unsubSlots(); unsubShared(); };
          }, [user]);

          const showToast = (msg, type = 'success') => {
            setToast({ msg, type });
            setTimeout(() => setToast(null), 4000);
          };

          const copyToClipboard = (text, successMsg) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
              document.execCommand('copy');
              showToast(successMsg || 'Kopierat!');
            } catch (err) { console.error('Kunde inte kopiera', err); }
            document.body.removeChild(textArea);
          };

          if (!user || isLoadingProfile) return <div className="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-900 transition-colors duration-300"><p className="text-slate-400 font-semibold animate-pulse tracking-widest uppercase text-sm">Laddar Samtala...</p></div>;

          return (
            <div className="min-h-screen bg-slate-50 dark:bg-slate-900 font-sans text-slate-800 dark:text-slate-100 transition-colors duration-300">
              
              {/* STICKY NAVBAR FÖR LÄRARE */}
              {currentView.startsWith('host') && teacherProfile && (
                <nav className="sticky top-0 z-50 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-700 px-4 md:px-8 py-3 flex justify-between items-center print:hidden shadow-sm transition-colors duration-300">
                  <div className="flex items-center gap-2 text-indigo-600 dark:text-indigo-400 font-bold text-xl cursor-pointer" onClick={() => window.location.hash = '#/'}>
                    <Calendar size={24} /> <span className="tracking-tight">Samtala</span>
                  </div>
                  <div className="flex items-center gap-4">
                    <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-slate-700 rounded-full transition-colors" title={isDarkMode ? "Ljust läge" : "Mörkt läge"}>
                        {isDarkMode ? <Sun size={18} /> : <Moon size={18} />}
                    </button>
                    <div className="flex items-center gap-3 bg-slate-50 dark:bg-slate-700 py-1.5 px-3 rounded-full border border-slate-200 dark:border-slate-600 shadow-sm transition-colors duration-300">
                      <div className="w-7 h-7 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-700 dark:text-indigo-300 rounded-full flex items-center justify-center font-bold text-xs">
                        {teacherProfile.name.charAt(0).toUpperCase()}
                      </div>
                      <span className="hidden md:inline text-sm font-semibold text-slate-700 dark:text-slate-200 truncate max-w-[150px]">
                        {teacherProfile.name}
                      </span>
                    </div>
                    {!user.isAnonymous && (
                      <button onClick={() => auth.signOut()} className="p-2 text-slate-400 hover:text-rose-600 dark:hover:text-rose-400 hover:bg-rose-50 dark:hover:bg-slate-700 rounded-full transition-colors" title="Logga ut">
                        <LogOut size={18} />
                      </button>
                    )}
                  </div>
                </nav>
              )}

              <main className={`max-w-5xl mx-auto p-4 md:p-8 ${currentView.startsWith('host') && teacherProfile ? 'mt-4' : 'mt-8'}`}>
                {(() => {
                  if (currentView.startsWith('host') && !teacherProfile) return <TeacherOnboarding user={user} db={db} appId={appId} />;

                  switch (currentView) {
                    case 'host_dashboard':
                      return <HostDashboard events={events} slots={slots} db={db} appId={appId} user={user} profile={teacherProfile} copyHelper={copyToClipboard} />;
                    case 'host_event':
                      const activeEvent = events.find(e => e.id === routeParams.eventId);
                      if (!activeEvent) return <div className="text-center p-12 text-slate-500 font-medium">Hittade inte händelsen.</div>;
                      return <HostEventDetails event={activeEvent} slots={slots.filter(s => s.eventId === routeParams.eventId).sort((a, b) => a.time.localeCompare(b.time))} db={db} appId={appId} copyHelper={copyToClipboard} triggerToast={showToast} />;
                    case 'event_public':
                      const publicEvent = events.find(e => e.id === routeParams.eventId);
                      if (!publicEvent) return <div className="text-center p-10"><h2 className="text-2xl font-bold text-slate-800 dark:text-slate-100">Ogiltig länk.</h2></div>;
                      return <EventPublicView event={publicEvent} slots={slots.filter(s => s.eventId === routeParams.eventId)} db={db} appId={appId} copyHelper={copyToClipboard} />;
                    case 'shared_selection':
                      const sharedData = sharedSelections.find(s => s.id === routeParams.sharedId);
                      if (!sharedData) return <div className="text-center p-10"><h2 className="text-2xl font-bold text-slate-800 dark:text-slate-100">Ogiltig länk.</h2></div>;
                      return <SharedSelectionView sharedData={sharedData} event={events.find(e => e.id === sharedData.eventId)} allSlots={slots} db={db} appId={appId} copyHelper={copyToClipboard} />;
                    case 'manage_booking':
                      const slotToManage = slots.find(s => s.id === routeParams.slotId);
                      return <ManageBookingView slot={slotToManage} event={slotToManage ? events.find(e => e.id === slotToManage.eventId) : null} db={db} appId={appId} />;
                    default:
                      return <div className="text-center p-12 text-slate-500 font-medium">Okänd rutt</div>;
                  }
                })()}
              </main>

              {/* GLOBAL TOAST */}
              {toast && (
                <div className="fixed bottom-6 right-6 bg-slate-900 dark:bg-slate-800 text-white px-5 py-3.5 rounded-2xl shadow-2xl flex items-center gap-3 z-50 slide-in-right border border-slate-700 print:hidden">
                  {toast.type === 'success' ? <CheckCircle size={18} className="text-emerald-400 flex-shrink-0" /> : <AlertCircle size={18} className="text-rose-400 flex-shrink-0" />}
                  <span className="font-medium text-sm">{toast.msg}</span>
                </div>
              )}
            </div>
          );
        }

        // ==========================================
        // BOKNINGSKVITTO
        // ==========================================
        function BookingReceipt({ receipt, copyHelper }) {
          const manageUrl = `${window.location.origin}${window.location.pathname}#/manage/${receipt.slotId}`;

          return (
            <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-xl overflow-hidden max-w-lg mx-auto border border-slate-100 dark:border-slate-700 fade-in transition-colors duration-300">
              <div className="bg-gradient-to-br from-emerald-500 to-emerald-600 p-8 text-center text-white relative">
                <div className="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4 backdrop-blur-sm border-4 border-emerald-400/30">
                  <Check size={48} className="text-white" strokeWidth={3} />
                </div>
                <h2 className="text-3xl font-bold mb-1 tracking-tight">Bokning bekräftad!</h2>
                <p className="text-emerald-100 font-medium">Tiden är nu reserverad för {receipt.childName}.</p>
              </div>

              <div className="p-8">
                {receipt.parentEmail && (
                  <div className="bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 p-4 rounded-2xl flex items-start gap-3 text-left mb-8 shadow-sm">
                    <Mail className="mt-0.5 flex-shrink-0 text-slate-400 dark:text-slate-500" size={20} />
                    <div>
                      <p className="font-bold text-sm text-slate-800 dark:text-slate-100">Bekräftelse skickad</p>
                      <p className="text-sm text-slate-500 dark:text-slate-400 mt-0.5">Vi har skickat ett kvitto och en kalenderinbjudan till <strong className="text-slate-700 dark:text-slate-200">{receipt.parentEmail}</strong>.</p>
                    </div>
                  </div>
                )}

                <div className="space-y-4 mb-8">
                  <div className="flex justify-between items-center py-3 border-b border-slate-100 dark:border-slate-700">
                    <span className="text-sm font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Händelse</span>
                    <span className="font-bold text-slate-800 dark:text-slate-100 text-right">{receipt.eventTitle}</span>
                  </div>
                  <div className="flex justify-between items-center py-3 border-b border-slate-100 dark:border-slate-700">
                    <span className="text-sm font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Tid</span>
                    <span className="font-bold text-indigo-600 dark:text-indigo-400 text-right">{receipt.timeString}</span>
                  </div>
                  <div className="flex justify-between items-center py-3 border-b border-slate-100 dark:border-slate-700">
                    <span className="text-sm font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Format</span>
                    <span className="font-bold text-slate-800 dark:text-slate-100 text-right">{receipt.meetingFormat}</span>
                  </div>
                  <div className="flex justify-between items-center py-3 border-b border-slate-100 dark:border-slate-700">
                    <span className="text-sm font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Med</span>
                    <span className="font-bold text-slate-800 dark:text-slate-100 text-right">{receipt.hostName}</span>
                  </div>
                </div>

                <button 
                  onClick={() => generateICS(receipt.eventTitle, receipt.timeString, receipt.meetingFormat, receipt.hostName)}
                  className="w-full flex items-center justify-center gap-2 bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200 dark:shadow-none mb-6 active:scale-[0.98]"
                >
                  <Download size={20} /> Ladda ner kalenderfil
                </button>

                <div className="pt-6 border-t border-slate-100 dark:border-slate-700 text-center">
                  <p className="text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-3">Hantera bokning</p>
                  <div className="flex flex-col sm:flex-row gap-3">
                    <button onClick={() => copyHelper(manageUrl, "Avbokningslänk kopierad!")} className="flex-1 flex items-center justify-center gap-2 bg-slate-50 dark:bg-slate-900 text-slate-600 dark:text-slate-300 py-3 px-4 rounded-xl text-sm font-bold border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                      <Copy size={16} /> Kopiera länk
                    </button>
                    <button onClick={() => window.location.hash = `#/manage/${receipt.slotId}`} className="flex-1 flex items-center justify-center gap-2 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 py-3 px-4 rounded-xl text-sm font-bold border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all shadow-sm">
                       Ändra tid
                    </button>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        // ==========================================
        // HANTERA BOKNING (AVBOKA) FÖR FÖRÄLDER
        // ==========================================
        function ManageBookingView({ slot, event, db, appId }) {
          const [isCancelled, setIsCancelled] = useState(false);

          if (!slot || !event) return <div className="text-center p-12"><p className="text-slate-500 font-medium animate-pulse">Laddar bokning...</p></div>;
          
          if (slot.status === 'completed') {
            return (
              <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-xl p-10 max-w-md mx-auto text-center border border-slate-100 dark:border-slate-700 fade-in transition-colors duration-300">
                <CheckCircle size={48} className="mx-auto text-emerald-400 mb-4" />
                <h2 className="text-2xl font-bold mb-2 tracking-tight text-slate-800 dark:text-slate-100">Mötet är avklarat</h2>
                <p className="text-slate-500 dark:text-slate-400 font-medium">Detta utvecklingssamtal har redan ägt rum och kan inte längre ändras.</p>
              </div>
            );
          }

          if (slot.status !== 'booked' && !isCancelled) {
            return (
              <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-xl p-10 max-w-md mx-auto text-center border border-slate-100 dark:border-slate-700 fade-in transition-colors duration-300">
                <AlertCircle size={48} className="mx-auto text-slate-300 dark:text-slate-600 mb-4" />
                <h2 className="text-2xl font-bold mb-2 tracking-tight text-slate-800 dark:text-slate-100">Tiden är inte bokad</h2>
                <p className="text-slate-500 dark:text-slate-400 mb-8 font-medium">Denna tid är antingen redan avbokad eller så är länken ogiltig.</p>
                <button onClick={() => window.location.hash = `#/b/${event.id}`} className="bg-indigo-600 text-white px-8 py-3.5 rounded-xl font-bold shadow-lg shadow-indigo-200 dark:shadow-none hover:bg-indigo-700 transition-all">Gå till bokningssidan</button>
              </div>
            );
          }

          const handleCancelBooking = async () => {
            if(window.confirm("Är du säker på att du vill avboka denna tid?")) {
              try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'samtala_slots', slot.id), {
                  status: 'available', bookerName: '', childName: '', parentEmail: '', meetingFormat: ''
                });

        function HostEventDetails({ event, slots, db, appId, copyHelper, triggerToast }) {
          const [activeTab, setActiveTab] = useState('list'); 
          const [searchQuery, setSearchQuery] = useState('');
          const [showTemplateModal, setShowTemplateModal] = useState(false); 
          
          // Edit State
          const [editingSlotId, setEditingSlotId] = useState(null);
          const [editData, setEditData] = useState({});

          const [date, setDate] = useState('');
          const [startHour, setStartHour] = useState('08');
          const [startMinute, setStartMinute] = useState('00');
          const [endHour, setEndHour] = useState('12');
          const [endMinute, setEndMinute] = useState('00');
          const [duration, setDuration] = useState(20);
          const [pause, setPause] = useState(5);
          
          const publicUrl = `${window.location.origin}${window.location.pathname}#/b/${event.id}`;
          
          // Filtrerar ut aktiva bokningar till listan
          const bookedSlots = slots.filter(s => s.status === 'booked');
          
          // Sök/Filter logik
          const filteredBookedSlots = bookedSlots.filter(slot => 
            (slot.childName || '').toLowerCase().includes(searchQuery.toLowerCase()) ||
            (slot.bookerName || '').toLowerCase().includes(searchQuery.toLowerCase()) ||
            (slot.parentEmail || '').toLowerCase().includes(searchQuery.toLowerCase())
          );

          // E-postmallar Funktion 
          const handleCopyTemplate = (terminText) => {
            const templateText = `Hej vårdnadshavare,\n\nNu är det dags för ${terminText}s utvecklingssamtal för att följa upp elevens studier och mående. Samtalen kommer att påbörjas [datum/vecka].\n\nFör bokning av tid använder vi bokningstjänsten Samtala. Det är principen först till kvarn som gäller för de tider som finns tillgängliga.\n\nKlicka på länken nedan för att boka din tid:\nLänk: ${publicUrl}\n\nVIKTIGT VID BOKNING:\nNär du valt en tid kommer du till ett kort formulär. För att jag ska kunna förbereda samtalen på bästa sätt är det obligatoriskt att ni fyller i:\n• VH:S NAMN (Fullständigt för- och efternamn)\n• BARNETS NAMN (Fullständigt för- och efternamn)\n• MÖTESFORM (Klicka i om ni vill ses FYSISKT på skolan eller DIGITALT)\n\nVid digitalt möte skickar jag ut en möteslänk via mejl i god tid innan vårt samtal.\n\nJag ser fram emot att träffas och prata om ert barns utveckling!\n\nVänliga hälsningar,\n${event.hostName}`;
            copyHelper(templateText, `E-postmall för ${terminText} kopierad!`);
            setShowTemplateModal(false);
          };

          const handleCopyAllEmails = () => {
            const emails = [...new Set(bookedSlots.map(s => s.parentEmail).filter(e => e && e.trim() !== ''))].join(', ');
            if (emails) {
              copyHelper(emails, `Kopierade ${emails.split(',').length} st e-postadresser!`);
            } else {
              triggerToast('Inga e-postadresser hittades för dessa tider.', 'error');
            }
          };

          // Redigera Funktioner 
          const startEditing = (slot) => {
            setEditingSlotId(slot.id);
            setEditData({
              childName: slot.childName || '',
              bookerName: slot.bookerName || '',
              parentEmail: slot.parentEmail || '',
              meetingFormat: slot.meetingFormat || ''
            });
          };

          const saveEditing = async (slotId) => {
            try {
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'samtala_slots', slotId), {
                childName: editData.childName,
                bookerName: editData.bookerName,
                parentEmail: editData.parentEmail,
                meetingFormat: editData.meetingFormat
              });
              setEditingSlotId(null);
              triggerToast('Bokningen har uppdaterats!');
            } catch (err) {
              console.error(err);
              triggerToast('Kunde inte spara ändringarna.', 'error');
            }
          };

          const handleGenerateSlots = async () => {
            if (!date) return triggerToast('Välj ett datum.', 'error');
            const currentMin = (parseInt(startHour) * 60) + parseInt(startMinute);
            const endTotalMin = (parseInt(endHour) * 60) + parseInt(endMinute);
            const dur = parseInt(duration);
            const brk = parseInt(pause || 0);

            if (currentMin >= endTotalMin) return triggerToast('Ogiltig tid.', 'error');

            const slotsToAdd = [];
            let tempMin = currentMin;

            while (tempMin + dur <= endTotalMin) {
              const h = Math.floor(tempMin / 60).toString().padStart(2, '0');
              const m = (tempMin % 60).toString().padStart(2, '0');
              const slotEndMin = tempMin + dur;
              const endHStr = Math.floor(slotEndMin / 60).toString().padStart(2, '0');
              const endMStr = (slotEndMin % 60).toString().padStart(2, '0');
              
              slotsToAdd.push({ eventId: event.id, time: `${date} kl ${h}:${m} - ${endHStr}:${endMStr}`, status: 'available', bookerName: '', parentEmail: '' });
              tempMin += dur + brk;
            }

            try {
              const slotsRef = collection(db, 'artifacts', appId, 'public', 'data', 'samtala_slots');
              for (const slot of slotsToAdd) await addDoc(slotsRef, slot);
              triggerToast(`Succé! Skapade ${slotsToAdd.length} tider.`);
            } catch (error) { triggerToast('Ett fel uppstod.', 'error'); }
          };

          const handleTeacherCancel = async (slot) => {
            if(window.confirm(`Vill du verkligen avboka tiden för ${slot.childName}?\nTiden blir ledig igen och ett mail skickas till föräldern.`)) {
              try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'samtala_slots', slot.id), {
                  status: 'available', bookerName: '', childName: '', parentEmail: '', meetingFormat: ''
                });
                
                if(slot.parentEmail) {
                  try {
                    await emailjs.send('service_gqyfr4m', 'template_i21aoc7', {
                      parent_email: slot.parentEmail,
                      event_title: event.title,
                      child_name: slot.childName,
                      time_string: slot.time,

          const [bookerName, setBookerName] = useState('');
          const [childName, setChildName] = useState('');

          const [isBookingMode, setIsBookingMode] = useState(false);
          const [isSharingMode, setIsSharingMode] = useState(false);
          const [justSharedLink, setJustSharedLink] = useState(null);
          const [receiptData, setReceiptData] = useState(null); 

          // Punkt 1: Filtrera bort passerade tider för deltagare!
          const availableSlots = slots
            .filter(s => s.status === 'available' && !isTimePast(s.time))
            .sort((a, b) => a.time.localeCompare(b.time));

          const groupedSlots = availableSlots.reduce((acc, slot) => {
            const [datePart, timePart] = slot.time.split(' kl ');
            if (!acc[datePart]) acc[datePart] = [];
            acc[datePart].push({ ...slot, displayTime: timePart || slot.time });
            return acc;
          }, {});

          const validateEmail = (email) => email.includes('@') && email.includes('.');

          const handleDirectBook = async () => {
            if (!bookerName.trim() || !childName.trim() || !parentEmail.trim() || selectedSlots.length !== 1 || !meetingFormat) return alert("Fyll i alla fält och välj mötesform.");
            if (!validateEmail(parentEmail)) return alert("Vänligen ange en giltig e-postadress.");
            
            try {
              const slotRef = doc(db, 'artifacts', appId, 'public', 'data', 'samtala_slots', selectedSlots[0]);
              await updateDoc(slotRef, { status: 'booked', bookerName, childName, meetingFormat, parentEmail }); 
              
              const slotData = availableSlots.find(s => s.id === selectedSlots[0]);
              
              // --- EMAILJS: Skicka bekräftelsemejl ---
              const manageUrl = `${window.location.origin}${window.location.pathname}#/manage/${slotData.id}`;
              try {
                await emailjs.send('service_gqyfr4m', 'template_kaa8pof', {
                  parent_email: parentEmail,
                  event_title: event.title,
                  child_name: childName,
                  time_string: slotData.time,
                  meeting_format: meetingFormat,
                  host_name: event.hostName,
                  manage_link: manageUrl
                });
                console.log("Bekräftelsemejl skickat!");
              } catch (emailError) {
                console.error("Kunde inte skicka mejl:", emailError);
              }
              // ----------------------------------------

              setReceiptData({ eventTitle: event.title, hostName: event.hostName, timeString: slotData.time, childName, meetingFormat, parentEmail, slotId: slotData.id });
            } catch (err) { console.error(err); }
          };

          const handleCreateShareLink = async () => {
            if (!bookerName.trim() || !childName.trim() || !parentEmail.trim() || selectedSlots.length < 2 || !meetingFormat) return alert("Fyll i alla fält och välj mötesform.");
            if (!validateEmail(parentEmail)) return alert("Vänligen ange en giltig e-postadress.");
            try {
              const docRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'samtala_shared'), {
                eventId: event.id, slotIds: selectedSlots, initiatorName: bookerName, childName, meetingFormat, parentEmail, status: 'pending' 
              });
              selectedSlots.forEach(async (id) => updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'samtala_slots', id), { status: 'soft_locked' }));
              const shareUrl = `${window.location.origin}${window.location.pathname}#/share/${docRef.id}`;
              setJustSharedLink(shareUrl);
              copyHelper(shareUrl, "Länken är skapad! Skicka till din partner.");
            } catch (err) { console.error(err); }
          };

          if (receiptData) return <BookingReceipt receipt={receiptData} copyHelper={copyHelper} />;

          if (justSharedLink) {
            return (
              <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-xl p-10 text-center max-w-md mx-auto border border-slate-100 dark:border-slate-700 fade-in mt-8 transition-colors duration-300">
                <div className="w-20 h-20 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 rounded-full flex items-center justify-center mx-auto mb-6"><Share2 size={40} /></div>
                <h2 className="text-2xl font-bold mb-3 tracking-tight text-slate-800 dark:text-slate-100">Länken är redo!</h2>
                <p className="text-slate-500 dark:text-slate-400 mb-8 font-medium">Skicka denna länk till din partner så att de kan göra det slutgiltiga valet.</p>
                <div className="bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 p-4 rounded-xl flex items-center justify-between gap-3 mb-6 shadow-inner">
                  <span className="truncate text-sm font-mono text-slate-600 dark:text-slate-400 font-medium">{justSharedLink}</span>
                  <button onClick={() => copyHelper(justSharedLink)} className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 p-2.5 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors shadow-sm text-slate-600 dark:text-slate-300"><Copy size={18} /></button>
                </div>
              </div>
            );
          }

          return (
            <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-xl overflow-hidden max-w-lg mx-auto border border-slate-100 dark:border-slate-700 fade-in transition-colors duration-300">
              <div className="bg-gradient-to-br from-indigo-600 to-indigo-800 p-8 text-center text-white relative">
                <h1 className="text-3xl font-bold mb-2 tracking-tight">{event.title}</h1>
                <p className="text-indigo-200 font-medium mb-6">Med {event.hostName}</p>
                <div className="bg-white/10 backdrop-blur-sm px-4 py-2 rounded-full inline-flex border border-white/20 shadow-sm"><p className="text-white text-sm font-bold tracking-wide">Steg {isBookingMode || isSharingMode ? '2' : '1'}: {isBookingMode || isSharingMode ? 'Uppgifter' : 'Välj tid'}</p></div>
              </div>

              <div className="p-6 md:p-8">
                {availableSlots.length === 0 ? (
                  <div className="text-center py-12 text-slate-400 dark:text-slate-500 font-medium bg-slate-50 dark:bg-slate-900 rounded-2xl border border-dashed border-slate-200 dark:border-slate-700">Inga lediga tider framåt i tiden kvar.</div>
                ) : (
                  <>
                    {!isBookingMode && !isSharingMode && (
                      <div className="space-y-8 fade-in">
                        {Object.entries(groupedSlots).map(([date, dateSlots]) => (
                          <div key={date}>
                            <h3 className="font-bold text-slate-800 dark:text-slate-100 mb-4 flex items-center gap-2 text-lg tracking-tight pb-2 border-b border-slate-100 dark:border-slate-700">
                              <Calendar size={20} className="text-indigo-500 dark:text-indigo-400" />{date}
                            </h3>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                              {dateSlots.map(slot => (
                                <label key={slot.id} className={`relative flex items-center justify-between p-4 border-2 rounded-2xl cursor-pointer transition-all duration-200 ${selectedSlots.includes(slot.id) ? 'border-indigo-600 bg-indigo-50 dark:bg-indigo-900/30 dark:border-indigo-500 shadow-md ring-4 ring-indigo-50 dark:ring-indigo-900/20' : 'border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:border-indigo-300 dark:hover:border-indigo-600 hover:shadow-sm'}`}>
                                  <input 
                                    type="checkbox" 
                                    className="hidden" 
                                    checked={selectedSlots.includes(slot.id)} 
                                    onChange={() => setSelectedSlots(prev => prev.includes(slot.id) ? prev.filter(id => id !== slot.id) : [...prev, slot.id])} 
                                  />
                                  <div className="flex items-center gap-3">
                                    <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center transition-colors ${selectedSlots.includes(slot.id) ? 'border-indigo-600 dark:border-indigo-500 bg-indigo-600 dark:bg-indigo-500' : 'border-slate-300 dark:border-slate-600'}`}>
                                      {selectedSlots.includes(slot.id) && <Check size={12} className="text-white" strokeWidth={3} />}
                                    </div>
                                    <span className="text-lg font-bold text-slate-800 dark:text-slate-100 tracking-tight">{slot.displayTime}</span>
                                  </div>
                                </label>
                              ))}
                            </div>
                          </div>
                        ))}
                      </div>
                    )}

                    {selectedSlots.length > 0 && (
                      <div className="mt-8 fade-in">
                        {selectedSlots.length === 1 && !isSharingMode && (
                          <div className="bg-slate-50 dark:bg-slate-900/50 p-6 rounded-2xl border border-slate-100 dark:border-slate-700 shadow-inner">
                            {!isBookingMode ? (
                              <button onClick={() => setIsBookingMode(true)} className="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 shadow-lg shadow-indigo-200 dark:shadow-none transition-all flex items-center justify-center gap-2 active:scale-[0.98]">
                                Gå vidare <ArrowRight size={20}/>
                              </button>
                            ) : (
                              <div className="space-y-5 fade-in">
                                <div className="flex justify-between items-center bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-600 shadow-sm mb-2">
                                  <div>
                                    <p className="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-0.5">Vald tid</p>
                                    <p className="font-bold text-indigo-700 dark:text-indigo-400">{availableSlots.find(s=>s.id===selectedSlots[0])?.time}</p>
                                  </div>
                                  <button onClick={() => setIsBookingMode(false)} className="text-sm font-bold text-slate-400 dark:text-slate-500 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors underline underline-offset-4">Ändra</button>
                                </div>

                                <div><label className="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2 ml-1">Ditt namn</label><input type="text" className="w-full p-4 border border-slate-200 dark:border-slate-600 rounded-xl bg-white dark:bg-slate-800 focus:border-indigo-500 outline-none transition-all font-medium text-slate-800 dark:text-slate-100" value={bookerName} onChange={e => setBookerName(e.target.value)} /></div>
                                <div><label className="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2 ml-1">Din e-post</label><input type="email" placeholder="namn@exempel.se" className="w-full p-4 border border-slate-200 dark:border-slate-600 rounded-xl bg-white dark:bg-slate-800 focus:border-indigo-500 outline-none transition-all font-medium text-slate-800 dark:text-slate-100" value={parentEmail} onChange={e => setParentEmail(e.target.value)} /></div>
                                <div><label className="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2 ml-1">Barnets namn</label><input type="text" className="w-full p-4 border border-slate-200 dark:border-slate-600 rounded-xl bg-white dark:bg-slate-800 focus:border-indigo-500 outline-none transition-all font-medium text-slate-800 dark:text-slate-100" value={childName} onChange={e => setChildName(e.target.value)} /></div>
                                
                                <div className="pt-2">
                                  <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-3 ml-1">Önskad mötesform</label>
                                  <div className="grid grid-cols-2 gap-3">
                                    <button type="button" onClick={() => setMeetingFormat('Digitalt (Länk)')} className={`p-4 rounded-xl border-2 flex flex-col items-center gap-2.5 transition-all ${meetingFormat === 'Digitalt (Länk)' ? 'border-indigo-600 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-400 shadow-sm' : 'border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-500 hover:border-slate-300 dark:hover:border-slate-600'}`}>
                                      <Video size={24} /> <span className="text-sm font-bold tracking-tight">Digitalt</span>
                                    </button>
                                    <button type="button" onClick={() => setMeetingFormat('Fysiskt på plats')} className={`p-4 rounded-xl border-2 flex flex-col items-center gap-2.5 transition-all ${meetingFormat === 'Fysiskt på plats' ? 'border-indigo-600 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-400 shadow-sm' : 'border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-500 hover:border-slate-300 dark:hover:border-slate-600'}`}>
                                      <MapPin size={24} /> <span className="text-sm font-bold tracking-tight">På plats</span>
                                    </button>
                                  </div>
                                </div>

                                <button onClick={handleDirectBook} className="w-full mt-4 bg-emerald-500 text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-emerald-200 dark:shadow-none hover:bg-emerald-600 transition-all active:scale-[0.98]">Bekräfta Bokning</button>
                              </div>
                            )}
                          </div>
                        )}
                        
                        {selectedSlots.length > 1 && !isBookingMode && (
                          <div className="bg-indigo-50 dark:bg-indigo-900/20 p-6 rounded-2xl border border-indigo-100 dark:border-indigo-900/50 shadow-inner">
                            {!isSharingMode ? (
                              <div>
                                <p className="text-indigo-800 dark:text-indigo-300 mb-4 font-bold flex items-center justify-center gap-2 text-lg tracking-tight"><Users size={20}/> {selectedSlots.length} tider valda.</p>
                                <button onClick={() => setIsSharingMode(true)} className="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 shadow-lg shadow-indigo-200 dark:shadow-none transition-all active:scale-[0.98]">Skapa länk för partner</button>
                              </div>
                            ) : (
                              <div className="space-y-5 fade-in">
                                <div className="flex justify-between items-center mb-4">
                                  <p className="font-bold text-indigo-800 dark:text-indigo-300">{selectedSlots.length} valda tider</p>
                                  <button onClick={() => setIsSharingMode(false)} className="text-sm font-bold text-indigo-400 dark:text-indigo-500 hover:text-indigo-700 dark:hover:text-indigo-300 transition-colors underline underline-offset-4">Ändra</button>
                                </div>

                                <div><label className="block text-xs font-bold text-indigo-400 dark:text-indigo-500 uppercase tracking-wider mb-2 ml-1">Ditt namn</label><input type="text" className="w-full p-4 border border-indigo-200 dark:border-indigo-800 rounded-xl bg-white dark:bg-slate-800 focus:border-indigo-500 outline-none transition-all font-medium text-slate-800 dark:text-slate-100" value={bookerName} onChange={e => setBookerName(e.target.value)} /></div>
                                <div><label className="block text-xs font-bold text-indigo-400 dark:text-indigo-500 uppercase tracking-wider mb-2 ml-1">Din e-post</label><input type="email" className="w-full p-4 border border-indigo-200 dark:border-indigo-800 rounded-xl bg-white dark:bg-slate-800 focus:border-indigo-500 outline-none transition-all font-medium text-slate-800 dark:text-slate-100" value={parentEmail} onChange={e => setParentEmail(e.target.value)} /></div>
                                <div><label className="block text-xs font-bold text-indigo-400 dark:text-indigo-500 uppercase tracking-wider mb-2 ml-1">Barnets namn</label><input type="text" className="w-full p-4 border border-indigo-200 dark:border-indigo-800 rounded-xl bg-white dark:bg-slate-800 focus:border-indigo-500 outline-none transition-all font-medium text-slate-800 dark:text-slate-100" value={childName} onChange={e => setChildName(e.target.value)} /></div>
                                
                                <div className="pt-2">
                                  <label className="block text-xs font-bold text-indigo-400 dark:text-indigo-500 uppercase tracking-wider mb-3 ml-1">Önskad mötesform</label>
                                  <div className="grid grid-cols-2 gap-3">
                                    <button type="button" onClick={() => setMeetingFormat('Digitalt (Länk)')} className={`p-4 rounded-xl border-2 flex flex-col items-center gap-2.5 transition-all ${meetingFormat === 'Digitalt (Länk)' ? 'border-indigo-600 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-800 dark:text-indigo-300 shadow-sm' : 'border-indigo-100 dark:border-indigo-800 bg-white dark:bg-slate-800 text-indigo-400 dark:text-indigo-500 hover:border-indigo-300 dark:hover:border-indigo-600'}`}>
                                      <Video size={24} /> <span className="text-sm font-bold tracking-tight">Digitalt</span>
                                    </button>
                                    <button type="button" onClick={() => setMeetingFormat('Fysiskt på plats')} className={`p-4 rounded-xl border-2 flex flex-col items-center gap-2.5 transition-all ${meetingFormat === 'Fysiskt på plats' ? 'border-indigo-600 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-800 dark:text-indigo-300 shadow-sm' : 'border-indigo-100 dark:border-indigo-800 bg-white dark:bg-slate-800 text-indigo-400 dark:text-indigo-500 hover:border-indigo-300 dark:hover:border-indigo-600'}`}>
                                      <MapPin size={24} /> <span className="text-sm font-bold tracking-tight">På plats</span>
                                    </button>
                                  </div>
                                </div>

                                <button onClick={handleCreateShareLink} className="w-full mt-4 bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-indigo-200 dark:shadow-none hover:bg-indigo-700 transition-all active:scale-[0.98]">Generera Länk</button>
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    )}
                  </>
                )}
              </div>
            </div>
          );
        }

        // ==========================================
        // ANDRAHANDS-VY: (DELAD LÄNK FÖR PARTNER)
        // ==========================================
        function SharedSelectionView({ sharedData, event, allSlots, db, appId, copyHelper }) {
          const [partnerName, setPartnerName] = useState('');
          const [receiptData, setReceiptData] = useState(null);
          
          if (!sharedData || !event) return <div className="text-center p-12 text-slate-500 font-medium">Laddar urval...</div>;
          const suggestedSlots = allSlots.filter(s => sharedData.slotIds.includes(s.id));

          const handleFinalBook = async (slotId) => {
            if (!partnerName.trim()) return alert("Fyll i ditt namn.");
            try {
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'samtala_slots', slotId), {
                status: 'booked', bookerName: `${sharedData.initiatorName} & ${partnerName}`, childName: sharedData.childName, meetingFormat: sharedData.meetingFormat, parentEmail: sharedData.parentEmail
              });
              sharedData.slotIds.filter(id => id !== slotId).forEach(async (id) => updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'samtala_slots', id), { status: 'available' }));
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'samtala_shared', sharedData.id), { status: 'resolved' });

              const slotData = allSlots.find(s => s.id === slotId);
              
              // --- EMAILJS: Skicka bekräftelsemejl ---
              const manageUrl = `${window.location.origin}${window.location.pathname}#/manage/${slotId}`;
              try {
                await emailjs.send('service_gqyfr4m', 'template_kaa8pof', {
                  parent_email: sharedData.parentEmail,
                  event_title: event.title,
                  child_name: sharedData.childName,
                  time_string: slotData.time,
                  meeting_format: sharedData.meetingFormat,
                  host_name: event.hostName,
                  manage_link: manageUrl
                });
                console.log("Bekräftelsemejl skickat!");
              } catch (emailError) {
                console.error("Kunde inte skicka mejl:", emailError);
              }
              // ----------------------------------------

              setReceiptData({ eventTitle: event.title, hostName: event.hostName, timeString: slotData.time, childName: sharedData.childName, meetingFormat: sharedData.meetingFormat, parentEmail: sharedData.parentEmail, slotId: slotId });
            } catch (err) { console.error(err); }
          };

          if (receiptData) return <BookingReceipt receipt={receiptData} copyHelper={copyHelper} />;

          if (sharedData.status === 'resolved') return <div className="text-center bg-white dark:bg-slate-800 p-12 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-700 max-w-md mx-auto mt-8 fade-in"><div className="w-20 h-20 bg-emerald-50 dark:bg-emerald-900/30 border-4 border-emerald-100 dark:border-emerald-800/50 text-emerald-500 dark:text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-6"><Check size={40} strokeWidth={3} /></div><h2 className="text-2xl font-bold tracking-tight text-slate-800 dark:text-slate-100">Redan bokad!</h2></div>;

          return (
            <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-xl overflow-hidden max-w-lg mx-auto border border-slate-100 dark:border-slate-700 fade-in mt-8 transition-colors duration-300">
              <div className="bg-gradient-to-br from-indigo-50 to-slate-50 dark:from-indigo-900/20 dark:to-slate-800 border-b border-indigo-100 dark:border-indigo-900/50 p-8 text-center">
                <h2 className="text-2xl font-bold mb-3 tracking-tight text-slate-800 dark:text-slate-100">Dags att välja!</h2>
                <p className="text-slate-600 dark:text-slate-300 font-medium"><strong className="text-slate-800 dark:text-white">{sharedData.initiatorName}</strong> har föreslagit tider för <strong className="text-slate-800 dark:text-white">{event.title}</strong>. Vilken passar dig bäst?</p>
              </div>
              <div className="p-8">
                <div className="mb-8"><label className="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2 ml-1">Ditt namn</label><input type="text" className="w-full p-4 border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-900 focus:bg-white dark:focus:bg-slate-800 focus:border-indigo-500 outline-none transition-all font-medium text-slate-800 dark:text-slate-100" value={partnerName} onChange={e => setPartnerName(e.target.value)} /></div>
                <div className="space-y-4">
                  {suggestedSlots.map(slot => (
                    <button key={slot.id} onClick={() => handleFinalBook(slot.id)} className="w-full flex justify-between items-center p-5 border-2 border-slate-100 dark:border-slate-700 rounded-2xl hover:border-indigo-600 dark:hover:border-indigo-500 hover:bg-indigo-50 dark:hover:bg-indigo-900/20 hover:shadow-md transition-all group text-left">
                      <span className="text-xl font-bold text-slate-800 dark:text-slate-200 group-hover:text-indigo-800 dark:group-hover:text-indigo-300 transition-colors">{slot.time}</span>
                      <span className="text-sm font-bold text-indigo-600 dark:text-indigo-400 opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap ml-4 flex items-center gap-1">Välj <ArrowRight size={16}/></span>
                    </button>
                  ))}
                </div>
              </div>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
